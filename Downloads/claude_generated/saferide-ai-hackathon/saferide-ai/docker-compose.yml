version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MODEL_SERVICE_URL=http://model:5001
      - SECRET_KEY=saferide-docker-secret
      - FLASK_DEBUG=0
    depends_on:
      - model
    volumes:
      - ./data:/app/data:ro

  model:
    build:
      context: .
      dockerfile: Dockerfile.model
    ports:
      - "5001:5001"
    environment:
      - MODEL_PORT=5001
    volumes:
      - ./model_service/saved_model:/app/model_service/saved_model:ro

  # Optional: simple static server for dashboard
  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
